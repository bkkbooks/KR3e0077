body:
  text: 醫旨緒餘卷下明孫一奎撰脇痛余弟於六月赴邑途行受熱且過勞性多躁暴忽左脇痛皮膚上一片紅如椀大發水泡瘡三五㸃脉七至而弦夜重于晝醫作肝經欝火治之以黄連青皮香附川芎柴胡之類進一服其夜痛極且增熱次早看之其皮膚上紅大如盤水泡瘡又加至三十餘粒醫教以白礬研末井水調敷仍於前藥加青黛龍膽草進之其夜痛苦不已呌號之聲徹于四鄰脇中痛如鈎摘之狀次早觀之其紅已及半身矣水泡瘡又増至百數予心甚不懌乃載歸以詢先師黄古潭先生先生觀脉案藥方哂曰切脉認病則審矣製藥定方則未也夫用藥如用兵知己知彼百戰百勝今病勢有燒眉之急叠卵之危豈可執尋常㵼肝之劑正治耶是謂驅羊搏虎矣且苦寒之藥愈資其燥以故病轉増劇水泡瘡發于外者肝欝既久不得發越乃侮其所不勝故皮腠為之潰也至于自焚則死矣可懼之甚為訂一方以大瓜蔞一枚重一二兩者連皮搗爛加粉草二錢紅花五分戌時進藥少頃就得睡至子丑時方醒問之已不痛矣乃索食予禁止之恐邪火未盡退也急煎藥渣與之又睡至天明時㣲利一度復睡至辰時起視皮膚之紅皆已氷釋而水泡瘡亦盡斂矣後亦不服他藥夫病重三日飲食不進呻吟不輟口一劑而愈真可謂之神矣夫瓜蔞味甘寒經云泄其肝者緩其中且其為物柔而滑潤於欝不逆甘緩潤下又如油之洗物未嘗不潔考之本草瓜蔞能治挿脇之痛盖為其緩中潤燥以致于流通故痛自然止也腹中水鳴生生子曰一婦三十五嵗無子恐夫娶妾致欝經不行者三月矣病腹痛惡心諸醫皆云有孕其夫亦粗知醫舉家欣喜治以安胎行氣止痛之藥服三五十帖不効痛苦益甚凡未申時發寒熱腹中有塊如彈子大者二三十枚翻騰作痛行動則水聲漉漉痛極則吐酸水五六碗吐盡則塊息而寒熱除痛亦不作明日亦然又作瘧治轉劇召予診左手弦尺濇右手濡弱重取則滑尺同左時經已五月不行矣予曰此欝病也豈有濇脉成孕之理若然則前藥當效矣其夫亦悟乃為製方以二陳加香附山梔撫芎𤣥胡當歸紅花之類藥進而痛止連與四帖皆効但藥止則痛發如故調治一月不能除根予因持脉案見先師黄古潭先生先生乃諭予曰此欝火病也其病起于肝膽盖肝主謀慮膽主決斷謀不決則欝生欝生則木盛木盛則凌脾脾傷則不能運化精微而生氣血以故月水不來也肺金失于母養則降殺之令不行木寡于畏而侮所不勝是以直沖犯清道以作吐也吐後諸症皆減者木升而火息也為裁一方以黄茋五錢柴胡三錢白芍藥二錢甘草一錢陳皮貝母枳實各五分姜三片一劑而寒熱除再劑而痛減吐止水聲亦絶七日不發其夫喜曰是何神速也乃拉予復請命于先生先生曰夫寒熱者少陽膽也吐酸者厥隂肝也痛而腹塊翻騰者火盛激動其水如鍋中湯滚泡浪沸騰是也吐多則肺金愈傷故用黄茋補肺金為君使得以制肝木以柴胡㵼肝為臣以升發其膽火經曰木欝則逹之逹是通逹之義夫木性上升者也既欝則不升故用柴胡升發膽肝之清氣使衝開其欝結以復其常又曰過者折之以其畏也所謂㵼之補肺制肝正謂此也又曰泄其肝者緩其中以甘草緩中為佐又曰木位之主其㵼以酸以白芍藥于脾中㵼木為臣病久生欝欝久則生涎以貝母陳皮枳實開欝逐涎為禆使然後金得其正木得其平土得其安由是病去而愈速前方用山梔黄連之類皆降下之藥火勢正熾豈區區寒涼所能抑哉故經曰輕者正治重則從其性而升之但凡治病要當識得此意先生吾徽黟人也汪石山翁弟子少業儒通五經以疾就醫治病每有超見此畧述其二耳且此今人所患者多而治者鮮有若是之明且盡也故揭附于斯以公同志者庶先生之名不泯也治腎消本事方云唐李祠部治消渴者腎虚所致每發則小便甜醫多不知其故方書缺而不言洪範曰稼穯作甘以物理推之淋餳醋酒作晡法須㬰即甜足明人之食後滋味皆甜流在膀胱若腰腎氣盛則上蒸炎氣化成精氣下入骨髓其次為脂膏又其次為血肉其餘則為小便故小便色黄血之餘氣也五臓之氣醎潤者則下味也若腰腎既虚冷則不能蒸化穀氣盡下為小便故味甘不變其色清冷則肌膚枯稿也猶如乳母穀氣上洩皆為乳汁味甘消渴病者下洩皆為小便皆精氣不實於内則小便頻數也又肺為五臓華盖若下有暖氣蒸則氣潤若下冷極則陽不能升故肺乾而渴譬如釡中有水以火暖之又以板覆之則暖氣上騰故板能潤若無火力則水氣不能上升此板終不得潤火力者腰腎强盛也常須煖補腎氣飲食得火力則潤上而易消亦免乾渴之患故仲景云宜服八味腎氣丸余族兄雙柏五旬後病此時師以滋隂降火之劑投之小便愈多色清而長味益甘則渴益甚屢更醫率認為熱盡用苦寒輕劑如天花粉黄連麥冬石膏知母之類重劑如汞丹之類不惟不效反至遍身如癩精神癯削脉皆細數余後至曰此東垣所云消渴末傳也能食者必發腦疽背瘡不能食者必𫝊中滿鼓脹今脉細數而膚皆隱􅇙寧免其無疽瘍乎急宜更藥毋用寒􅈵壊胃也乃以腎氣丸加桂心五味子鹿角􅑟益智仁服之半月精神霈長消渴痊除小便不甜膚􅇙俱脱十年無恙後以不如意事觸之渴疾復作諸醫又以滋隂劑與之遂成腫滿而斃嗚呼痛哉設若守加味腎氣丸未必有是腫滿病也仲景東垣實為祖師千載之下益使人崇信也特附于斯以告同志羅太無藥戒客有病痞者積于其中伏而不得下自外至者捍而不得納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支焦膈通逹呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是不踰月而痞五作五下每下輒愈然客之氣一語而三引體不勞而汗股不步而慄肌革無所耗于前而其中薾然莫知其所來嗟夫心痞非下不可已予従而下之術未爽也薾然獨何如聞楚之南有良醫焉往而問之醫笑曰子無怪是薾然者也凡子之来固為是薾然也坐吾語汝天下之理有甚快于吾心者其末也必有傷求無傷扵其中則無望快于吾心夫隂伏而陽蓄氣與血不運而為痞横乎子之胸者其累大矣撃而去之不須㬰而除甚大之累和平之物不能為也必将搏擊震撓而後可夫人之和氣沖然而甚微泊乎其易危擊搏震撓之功成而子之和亦已病矣由是觀之則子之痞凡一快者則子之和亦一傷矣不踰月而快者五子之和平之氣不既索乎故薾然如不終日也且将去子之痞而無害於和也子歸燕居三月而後與之藥可為也客歸三月齋戒而復請之醫曰子之氣少復矣取藥而授之曰服之三月而疾少平又三月而少康終年而可復常且飲藥不得亟進客歸而行其說然其初使人懣然而遅之盖三投藥而三反之也然日不見其所攻之效久較則月異而時不同終嵗而疾平矣客謁醫再拜而謝之坐而問其故醫曰此醫國之説豈特施之於病哉子獨不見秦之治民乎捍而不聴令墯而不勤事放而不畏法令之不聴治之不變則秦之民常痞矣商君見其痞也厲以刑法威以斬伐悍厲猛鷙不毫髪少貸痛剗而力鉏之於是乎秦之政如建瓴流通四逹無敢或拒而秦之痞常一快矣自孝公以至二世凡幾痞而㡬快矣頑者已圮强者已柔而秦之民無懽心矣故猛政一快者歡心一亡積快而不已而秦之四肢枵然徒具其物而已民心日離而君孤立於上故匹夫大呼不終日而百姓皆起秦欲運其手足肩膂而漠然不我應故秦之亡也是好為快者之過也昔者先王之民其初亦嘗痞矣先王豈不知砉然撃去之以為速也惟懼其有傷于中也故不敢求快於吾心優柔而撫育之教以仁義道以禮樂隂解其亂而除去其痞旁視而懣然有之矣然月計之嵗察之前嵗之俗非今嵗之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教逹安樂久而後患除矣是故三代之治皆更數聖人歴數百年而後俗成則予之藥終年而疾愈盖無足恠也故曰天下之理有甚快於吾心者其末也必有傷求無傷於其中則無望快於予心雖然豈特治天下為然哉客再拜而紀其説人經脉上下左右前後二十八脉考靈樞經苐十五篇有曰人經脉上下左右前後二十八脉以應二十八宿夫謂二十八脉者何左右手足上下各十二經又隂蹻陽蹻共二十六也合任督二脉前後以足其數云人身四海說生生子曰天有四時地有四海而人亦應之四海者髓海血海氣海水穀之海也十二經水皆注于海也岐伯曰胃者水穀之海其輸上在氣街下至三里衝脉者為十二經之海其輸上在于大杼下出于巨虚之上下亷膻中者為氣之海其輸上在于柱骨之上下前在于人迎腦為髓之海其輸上在于其盖下在風府有餘不足皆可得而見也氣海有餘者氣滿胷中悦息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿不足則飢不受穀食髓海有餘則輕勁多力自過其度不足則腦轉耳鳴脛痠眩冐目無所見懈怠安卧凡此有餘不足宜審守其輸而調其虚實無犯其虚順者得復逆者必敗出靈樞海論篇刪定野山祕抄種子論易曰天地絪縕萬物化醇男女媾精萬物化生則絪縕者升降凝聚之謂也媾精者配合交感之謂也必二氣合則化自生矣否則獨陽不生獨隂不成惡能望其化生哉然則人之不孕育者豈夫婦竟無一交媾之遇耶遇而不識不㑹是亦獨隂獨陽之謂也不知者諉於天命則泥矣間有倡為資藥餌以養精血候月水以種孕育又多峻補以求詭遇則嗣未必得而害巳隨之此固予之痛惜也久矣因究種子之道有四一曰擇地二曰養種三曰乗時四曰投虛是也何也盖地則母之精也種則父精也時則兩精交媾之時也虚則去舊生新之初也又嘗聞之師曰不受胎之原有二隂失其道而不能受者以氣勝血衰故也衰則寒熱乗之氣凝血滯而營衛不和經水先後多寡不一也陽失其道而不能施者以氣虛精弱故也弱則原于色欲過度耗其精元精元既弱譬之射者力㣲矢枉安能中的究斯二者皆由不能自寳以致真元耗散陽不施隂不受隂涸陽枯則生生之道息矣猶乃歸之天命不亦悮哉以是種子者必地盛則種可投又必時與虛俱得焉可成孕而生子矣雖然至難養者精至難遇者時與虛苟不慿以藥餌之力示以調攝之宜候以如期之法則養與遇竟茫然矣又知種子之法以調經養精為首而用藥須審平和夫婦尤必相保守旬日之間可使精元俱盛待時而合時則所謂三十日中兩日半也經候至此積穢蕩滌既盡新血初生時與虚俱㑹而可以施其巧矣又恐情竇不開隂陽背弛續有竒砭以動其慾庶子宫開而真元媾合兩情暢美雖平生不孕者亦孕矣尚何疑哉是乃歴試歴驗百發百中者也嗚呼是說也豈畔道云乎哉亦以培植元氣順養天真特資藥力以佐助之所謂人定亦可以勝天者是也由是而知始而無嗣者非天也人自戕天也繼而有嗣者亦非天也人能成其天也故曰斯道順則成人逆則成丹慎毋以天命自諉也噫以天命自諉者良可惜哉護胎說凡婦人孕後當戒之在色不知自慎則慾動而子宫復開豈惟多致半産漏下即生子亦多瘡毒夭傷何也由淫火爍胎也彼馬牛之類受胎後牡逼身輒蹄之使不得近謂之護胎何致有半産之事人惟多慾故往往不知護也産寳論及婦人科俱缺此一欵余故采菽園雜記所載者潤色之如此王節齋本草集要参蓍論或有問於生生子曰觀子視病用藥嘗於各家所長中求之亦未嘗見子純用參蓍何獨於此便便不絶口耶予曰予之便便盖欲白王公之寃而針時師之癖也王公以六經出身行軒岐之道著書立言生生之志廓然矣觀其書羽翼丹溪固欲成人之美者盖丹溪掃溫補之弊其書雖行後之人顛倒於其間者猶未斬然而截迹也故王公亹亹告戒常恐後之人不遵丹溪隂虚之說而闖溫補之籓豈意後人不究其原而于告戒之處則一槩木偶而泥塑凡遇發熱咳𠻳見紅之疾不察病因不詢兼症則曰此正王公隂虚火動忌用參蓍之病也當以滋隂降火治之寃哉寃哉王公欲成人之美者詎謂釀禍迨今不已耶何者時師誦王公之書於雜著則曰是拳拳扵滋隂也誦本草於參蓍則曰是溫也積溫可以成熱此陽也陽旺則隂愈消肺寒則可服肺熱反傷肺等語時不徹口間欲有用之者則衆起而排之乃曰參蓍豈易服者耶服則殺人是以病家亦相安於滋隂雖死而無悔也識卓理融者每為之束手正如一傅衆咻欲求不寒心也難矣推王公之心抑何嘗謂参蓍不補隂而特補陽哉觀其序本草集要云古人因病以立方非製方以待病學醫之道莫先扵讀本草藥性明然後學處方云云時師觀書只識吹毛求疵安知通章大義又安知寓意之處如古人諷諫之謂也王公本草集要於人参條下云味甘氣溫㣲寒云云夫既主補五臓安精神定魂魄止驚悸除邪氣明目開心益志調中生津通血脉治五勞七傷已上症誰謂非五臓之隂虛者耶王公曷為不刪而略之王公盖以其味甘氣雖溫而又有㣲寒在焉故集此為補隂者之法眼也雖有肺受火邪喘𠻳及隂虗火動勞𠻳吐血勿用之語盖指不當補而補之者觀其復引仲景治亾血脉虚以此補之謂氣虚血弱故補其氣而血自生隂生於陽甘能生血也以通章大義觀之王公何嘗道人參不補隂也丹溪治隂虚咳𠻳瓊玉膏葛可久治吐血獨參湯義皆孚此扵黄蓍條下云味甘氣微温云云夫既補丈夫虚損五勞羸瘦補中生血補肺氣實皮毛㵼隂火為退熱之聖藥治虚勞自汗無汗則發有汗則止又治消渴腹痛泄痢腸風血崩帶下月候不匀産前後一切痛補腎三焦命門元氣藥中呼為羊肉已上症誰謂非五臓之隂虚者耶王公曷為不刪而畧之王公亦以其甘能生血且其氣微溫是以能溫分肉而實皮毛以通章大義觀之王公何嘗道黄茋不補隂也東垣治血虚發熱以黄茋一兩當歸二錢名曰補血湯治盗汗用當歸六黄湯以黄茋為君義皆本此夫本草之所以集者特述其藥性之剛柔氣味之溫涼補㵼之專功以為立方治病之準誰謂通章之義不足慿而於一句積溫成熱之說獨可據哉必如時師所言養血藥中以四物湯為主加黄柏知母就為滋隂降火之妙劑則愜然服之而無疑抑不思當歸味甘辛氣溫川芎味辛氣溫當歸雖補血亦能破血以其甘中有辛也川芎上行頂巔下行血海乃血中之氣藥也治一切氣溫中散寒開欝行氣燥濕又曰久服則走散真氣盖辛散故也較之於參蓍補性優劣為何如俱一本草語也俱王公所集要也時師既宗王公乃不畏芎歸之辛而獨畏參蓍之甘抑何僻也丹溪心法傳中羅成之云先生猶以芎歸之􅒏辛溫而非隂虚者所宜服況其他乎時師既遵王公當求王公之所自知王公之所自則可以知丹溪之用心矣予故曰丹溪謂隂虚者救時之言也王公道隂虚者成人之美者也時師言隂虛者偏而僻者也畏人参如虎者此又丹溪王公之罪人悮天下之蒼生者也予之便言豈好辨哉願為王公之忠臣耳洗寃録載沿身骨節上下聨絡名目夫人兩手指甲連者小節小節之後中節中節之後本節本節之後肢骨之前生掌骨掌骨上生掌肉掌肉後可屈曲者腕腕左起髙骨者手外踝右起髙骨者右手踝二踝相連生者臂骨輔臂骨者髀骨三骨相經者肘骨前可屈曲者曲肘曲肘上生者臑骨臑骨上生者肩髃肩髃之前者髃骨髃骨之前髀骨髀骨之中陷者缺盆缺盆之上者頸頸之前者顙喉顙喉之上者結喉結喉之上者胲胲兩傍者曲頷曲頷兩傍者頤頤兩傍者頬車頬車之上者耳耳上者曲鬢曲鬢上行者頂頂前者顖門顖門之下者髮際髮際正下者額額下者眉眉際之末者太陽穴太陽穴前者目目兩傍者兩小眥小眥上者上臉下者下臉正位能瞻視者目瞳子瞳近鼻者兩大眥近兩大眥者山根山根上印堂印堂上者腦角腦角下者乗枕骨􅆃骨下横生者髖骨髖骨兩傍者釵骨釵骨下中者腰門骨釵骨上連生者腿骨腿骨下可屈曲者曲䐐曲䐐上生者膝葢骨盖骨下生者脛骨脛骨傍生䯒骨䯒骨下左起髙大者兩足外踝右起髙大者兩足右踝脛骨前垂者兩足跂骨跂骨前者足本節本節前者小節小節相連者足趾甲趾甲後生者足前趺趺後凹陷足心下生者足掌骨掌骨後生者踵肉踵肉後者脚跟也洗寃録驗胎法又五臓論有稱耆婆者云一月如珠露二月如桃花三月男女分四月形象全五月筋骨成六月毛髪生七月動右手扵母腹左八月動左手扵母腹右九月三轉身十月滿足生若驗得未成形象只驗所墮胎作血肉一片或一塊若經日壊爛多化為水若所墮胎已成形像者謂頭腦口眼耳鼻手脚指甲等全亦有臍𢃄之類若胎在母腹中被驚而死其胎下係紫黑色血䕃軟弱若生下腹外死者其屍係淡紅赤色胞衣白却無紫黑色極易驗也人身内景說咽之與喉有二竅前後不同喉在前咽在後咽則因物而嚥以應地氣而為胃之系下連胃管為水谷之道路自咽而入於胃胃主腐熟水谷其水谷精悍之氣自胃之上口出於賁門輸於脾脾氣散精上歸於心淫精於脉脉氣流經經氣歸於肺肺朝百脉輸精於皮毛毛脉合精氣行于腑腑精神明留於四蔵沖和百脉頥養神氣利關節通九竅滋志意者也其滓穢則自胃之下口入於幽門𫝊於小腸自小腸下口至于大腸上口大小二腸相㑹為闌門闌門者闌約水谷以分别也其水則滲灌入于膀胱膀胱者胞之室也胞虗受水而為蔵水之室家也其濁穢入于大腸大腸一名囘腸以其囘屈而受小腸之濁穢也喉主出納以應天氣而為肺之系下接肺經為喘息之道路自喉嚨而通於肺肺下無竅而有空行列分布諸蔵清濁之氣以為氣管大腸為肺之府肺色白故大腸為白腸主𫝊送濁穢之氣下行而不使上干於心肺所謂𫝊㵼行道之府也肺之下有心心系有二一則上與肺相通一則自肺葉曲折向後並􅆃膂細絡相連貫􅆃通髓而與腎系相通小腸為心之府心色赤故小腸為赤腸主引心火濁氣下行而不使上干于華盖所謂容受之府也盖心通五蔵系而為五蔵之主有膈膜遮蔽濁氣不得上薰于心所以真心不受邪凌犯其所以致病者心包絡耳心包絡是心上漫脂之外有細筋如絲與心肺相連者是也心包絡經自膻中散布絡繞于三焦三焦其氣通灌十二經絡上下往来無有休息自與心包絡配合為表裏故俱有名而無合應脾系在膈下著右脇上與胃膜相連胃為脾之府脾色黄故胃為黄腸而為水谷之府也肝系在心肺下著左脇上貫膈入肺中與膈膜相連而膽在肝短葉之間膽為肝之府肝色青故膽為青腸而為清浄之府也腎與臍對形如石卵而曲附􅆃膂有系上通于心所謂坎離相感水火升降者此也膀胱為腎之府腎色黒故膀胱為黑腸而為津液之府也不執方說余屈首受醫日惟有事于素難病源病機甲乙等書俯而誦仰而思希心融貫前哲秘旨而未逮也若彼局方袖􅈿惠濟等集間用之㕘考而不敢執泥至臨症務虚心察受病之因始敢投劑亦未嘗執方以合病以故執方之夫往往見而駭之議之謂如上方書之𫝊簡易㨗徑大有便于後學素難諸書固云精妙迺渙漫艱深力難究竟胡子好難惡易􅒏與人殊且子胗病用藥類與方書懸異有病同而劑異有始終用一法而不殊有三五變其方而不軌輒亦投劑獲効此遵何道哉或方書不足憑而他有祕授歟奚與諸醫殊致也余曰嘻醫何容易談哉人之死生關于呼吸間余何敢師心自用而巇嶮為也古稱用藥如用兵然齊步伐肅部伍坐作進退刺殺攻擊一定而不亂者法也胡可廢也迺若知己知彼置伏設竒臨變不測其運用妙扵一心藥之君臣佐使味之甘苦寒涼方之丸散湯引著于載籍者法也察病之寒熱虚實感之臟腑表裏所以君臣佐使甘苦寒涼補而丸散湯引者不廢方亦可不執方也故按圖用兵而不達變者以卒與敵執方治病而不察因者未有能生人者也雖然不執方而又合法亦匪易臻也脫非生平融通素難本草仲景潔古守真東垣丹溪諸書不可以語此祕宻醫何容易談也子徒以方書為㨗徑盍亦未求之上古乎上古之世無方扁鵲𫝊載長桑君以禁方相授受亦不載曰何方春秋時秦緩醫和漢淳于公輩以醫名天下亦未嘗有方𫝊也至張仲景乃始有方是知東漢已前醫皆妙悟心法察病投劑未嘗徇方也彼豈私其方不欲授之人哉誠懼後之人拘執不變必致悮人耳然立法處方不過酌病機之詳確審經絡之虚實察藥􅒏之宜悖明氣味之走守合色脉衍天和調燮隂陽恭相造化以一理貫之理融則識真識真則機順自然應變不􅑟方自吾心出病可去而功可成以成功而名方誰曰不可余何能余僅守方而不執焉巳子寧以余言為迂乎張劉李朱滑六名師小𫝊孫氏生生子曰醫以通變稱良而執方則泥故業醫者能因古人之法而審其用法之時斯得古人立法之心矣不則窺其一斑而議其偏長即醫如張仲景李東垣諸公亦妄加譏貶也可乎哉可乎哉余故列其因時立法者于後醫學自漢秦以上無方有方自張長沙始故醫家以長沙為方書之祖晩世議長沙者率謂其長於傷寒而短扵雜症余惟醫如長沙亦無間然矣乃長沙急於傷寒者盖病莫大于傷寒而變症亦莫甚於傷寒其生死決于七日十三四日之間非若他疾可従容而治也長沙察其緩急故以傷寒為首務爾不然金櫃要略治雜症書也獨非長沙著述者乎何顒别𫝊有曰仲景受業扵同郡張伯祖善於治療尤精經方時人謂扁鵲倉公無以加焉觀此則仲景不専長於傷寒又可知矣而劉宗厚亦曰吾嘗用東垣之藥效仲景處方宗厚丹溪髙弟也不效丹溪而效仲景以仲景醫之亞聖非丹溪可企及者效仲景或亦取法乎上之意云後世慎毋輕議長沙也張戴人醫亦竒傑也世人不究其用意議其治疾惟事攻擊即明理如丹溪格致餘論亦譏其偏丹溪之說出益令人畏汗吐下三法如虎并其書置之不與睫交予甚寃之予惟人之受病如寇入國不先逐寇而先拊循適足以養寇而擾黎元也戴人有見於是故以攻疾為急疾去而後調養是得靖寇安民之法矣彼仲景麻黄𤓰蒂大承氣非攻擊急劑哉審緩急而用之此仲景意也盖醫難於認病而不難於攻擊調補戴人特揭其難者言之也丹溪引内經邪之所湊其氣必虗為論乃遺下文留而不去其病為實一句引精氣奪則虚又遺邪氣盛則實一句引虚者正氣虚也又遺實者邪氣實也一句摭其可議戴人為言而于戴所急略而不採丹溪且若此餘又何怪哉且戴人名其書曰儒門事親豈有儒者事親而行霸道以害其親者哉必不然矣譬彼武王伐殷先懸紂於太白而後散財發粟漢髙入秦降子嬰而後約法三章彼拘拘然進調補而詘攻擊是猶治國専用賞而不用罰也則舜討凶而尼父誅卯為多事哉予因著於篇以為戴人辨白有謂劉守真長於治火斯言亦未知守真所長也守真髙邁明敏非泛常可儔其所治多在推陳致新不使少有怫欝正造化新新不停之意醫而不知此是無術也此王海蔵之言海蔵乃東垣髙弟尚推轂如此則其䆳學可知且其所撰原病式歴揭素問病機一十九條而属火者五又覘人心好動諸動属火夫五行具于人身者各一惟火有君有相由此病機属火者多也原病式特為病機而發故不暇論及其餘若所著保命集三卷治雜症則皆妙絶矣然則謂守真長于治火者其真未知守真所長者乎醫家雅議李東垣善于内傷而虛怯非其所長故有補腎不若補脾之語竊謂腎主闔闢腎間原氣人之司命豈反輕於脾胃哉盖病有緩急而時勢有不同東垣或以急者為首務也彼當金元擾攘之際人生斯世疲于奔命未免勞倦傷脾憂思傷脾飢飽傷脾何莫而非傷脾也者内經曰脾胃者倉廪之本營之居也又曰五臓六腑皆禀受于脾胃脾胃一傷則臓腑無所受氣故東垣惟孜孜以保脾胃為急彼虚怯傷腎隂者乃燕居安閑淫勝之疾又不可同日而語也不則内外傷辯惑與外科精義及蘭室祕蔵等書皆治雜症者豈止内傷已哉此可以觀矣余觀近世醫家明理學者宜莫如丹溪雖倡陽有餘隂不足之論其用意固有所在也盖以人當承平酗酒縦慾以竭其精精竭則火熾復以剛劑認為溫補故不旋踵血溢内熱骨立而斃與燈膏竭而復加炷者何異此陽有餘隂不足之論所由著也後學不察槩守其說一遇虚怯開手便以滋隂降火為劑及未期卒聲啞洩㵼以死則曰丹溪之論具在不知此不善學丹溪之罪而于丹溪何尤丹溪為許文懿髙弟學原考亭其認病最真而投劑最確觀其治許文懿之病及疼風十三症可槩見矣功首罪魁之言余嘗為寃之昔荀卿喜為髙論而李斯祖之以禍天下則報讐行刼之說著矣大都前哲立論必有定見調施經權必合宜適彼執方而不達變者反為丹溪累也余故不惜牙頬辯之余讀史記至太史公所稱由光及伯夷之語未嘗不掩卷歎滑伯仁之術而後無有彰之者伯仁我明竒士也技藝之精不下丹溪即其文辭如素問抄難經註診有樞要針有經絡發揮與瘡瘍痔瘻醫韻等萹亦可謂集往哲之大成矣顧後學但知宗丹溪心法如靈素於伯仁諸集若罔聞知雖其術有竒中治有明徵所至成名如朱太史列傳所稱亦莫之顧何哉盖丹溪為當時縉紳所游揚又戴元禮劉宗厚諸名士為弟子故丹溪之名藉藉而伯仁藝雖高弗若之矣何一陽有言歴考上古髙賢若以岐伯越人為醫中尼父則仲景可為顔曾之陪而河間東垣當在宰我子貢之列若伯仁義理精明製作醇粹可與游夏之班至彦修又下一等也此論甚確而今宗伯仁者不然也豈惟伯仁則戴人守真亦若是爾故太史公曰岩穴之士欲砥立名行非附青雲之士惡能聲施後世哉此言信矣余故特為伯仁表之也生生子曰余著論若是非阿所好也欲後人知仲景不徒以傷寒擅長守真不獨以治火要譽戴人不當以攻擊蒙譏東垣不専以内傷樹績陽有餘隂不足之譚不可以疪丹溪而攖寧生之長技亦将與諸公並稱不朽矣同志者幸亮之毋余訾哉醫通節文生生子曰余嘗稱宋儒謂為人子不可不知醫為知言已觀韓氏醫通益證斯言為匪欺也韓飛霞為親習醫而餘澤徧物閲其集方楷當而修製合宜其投劑多竒中有以哉余懼其術沒沒也用采其論藥數欵附於集令後人識有韓飛霞云醫通緒論章飛霞子曰天地萬物氣成形也不位不育病之時也人之養氣踐形而致中和者醫之道也夫醫而至于鍼砭藥餌第二義矣易无妄九五曰无妄之疾勿藥有喜孔子曰无妄之藥不可試也此最上義也得醫之最上義者氣之沖神之化皆此身之真息以踵也盧扁指竪子華佗剖腸腑白玉蟾呵臋癰藥餌云乎哉鍼砭云乎哉風土異宜自然氣隔古分南北二政自今輿圖以河界南北而江之東關之西可類従矣南北云者隂陽之軌四方之轂八風之輻輳也人之禀賦参天兩地一氣流行而已氣失其平之謂疾疾甚之謂病三才相因之謂機機動之謂時隂符經曰天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆又曰食其時百骸理動其機萬化安又曰三才既宜三盗既安嗚呼此可以契醫之三昧矣乎醫之理可比周易鍼砭藥餌即卜筮法也丹溪云冷生氣髙陽生之􅍝言予謂冷生氣是復卦熱生風是姤卦即天根月窟之化機内經所謂亢則害承乃制者也故王安道論曰易也者造化之不可常者也惟其不可常故神化莫能測易曰一隂一陽之謂道隂陽不測之謂神世之攻醫卜而自小焉者何也藥性裁成藥有成性必材相制味相洽而後逹夫病情古書如本草括湯液􅈿珠諸篇予不能悉記也而二五之升沈醎苦酸辛甘者觸物在焉姑列數則以例其餘論用藥標病攻擊宜生料者以氣全力强本病服餌宜製煉調劑大成病在元氣宜醇澹論人参人参煉膏囘元氣於無何有之鄉王道也黑附子囘陽霸功赫奕甘草調元無可無不可論當歸當歸主血分之病川産力剛可攻秦産柔宜補凡用本病酒製而痰獨以薑汁浸透導血歸源之理熟地黄亦然血虚以人参石脂為佐血熱以生地黄薑黄條芩佐之不絶生化之源血積配以大黄婦人形肥血化為痰二味薑浸佐以利水道藥要之血藥不容舎當歸故古方四物以為君芍藥為臣地黄分生熟為佐川芎為使可為典要云論香附香附主氣分之病香能竄苦能降推陳致新故諸書皆云益氣而俗有耗氣之訛女科之専非也治本病略炒兼血以酒煮痰以薑汁虚以童便浸實以鹽水煮積以醋浸水煮婦人血用事氣行則無疾老人精枯血閉惟氣是資小兒氣日充形乃日固大凡病則氣滯而餒故香附於氣分為君藥世所罕知佐以木香散滯洩肺以沈香無不升降以小茴香可行經絡而鹽炒則補腎間元氣香附為君参茋為臣甘草為佐治虚怯甚速佐以厚朴之類決壅積佐以稜莪之類攻壅積之甚者予嘗避諸香燥之熱而用檀香佐香附者以檀香流動諸氣極妙也論半夏痰分之病半夏為主脾主濕每惡濕濕生痰而寒又生濕故半夏之辛燥濕也然必造而為麴以生薑自然汁生白􅈨湯等分共和造麯楮葉包裹風乾然後入藥風痰以猪牙皂角煮汁去渣滓煉膏如餳入薑汁火痰黑色老痰如􅑟以竹瀝或荆瀝入薑汁濕痰白色寒痰清以老薑煎濃湯加煅白􅈨三分之一如半夏三兩煅􅈨一兩俱造麯如前法予以霞天膏加白芥子三分之二薑汁􅈨湯竹瀝造麯治痰積疴者日能使腐敗隨大小便出或散而為瘡此半夏麯之妙也古方二陳湯以此為君世醫因辛反減至少許而茯苓渗濕陳皮行氣甘草醒脾皆臣佐使而反多其銖兩盖不造麯之過觀法製半夏以薑􅈨製辛即能大嚼是也佐以南星治風痰以薑汁酒浸炒芩連及𤓰蔞實香油拌麯畧炒之類治痰火以麯炒枳殻只實薑汁浸蒸大黄海粉之類治老痰以蒼术白术俱米泔薑汁浸炒甚至乾薑烏頭皆治濕痰而常有脾洩者以肉豆䓻配半夏麯加神麯麥牙作丸尤有竒効厚養之人酒後多此而苦痰為病者十常八九也方書謂天下無逆流之水人身有倒上之痰氣亂血餘化而為痰故治痰以行氣殺血為要論黄連火分之病黄連為主五臓皆有火平則治病則亂方書有君火相火邪火龍火之論其實一氣而已故丹溪云氣有餘便是火分為一類凡治本病略炒以従邪實火以朴硝湯假火以酒虚火以醋痰火以薑汁俱浸透炒氣滯火以茱茰食積洩以黄土血疾癥瘕痛以乾漆俱以水拌同炒去茰土漆下焦伏火以鹽水浸透焙目疾以人乳浸蒸或㸃或服生用為君佐官桂少許煎百沸入蜜空心服能使心腎交于頃刻入五苓滑石大治夢遺以土薑酒蜜四炒者為君史君子為臣白芍藥酒煮為佐廣木香為使治小兒五疳以茱茰炒者加木香等分生大黄倍之水丸治五痢以薑汁酒煮者為末和霞天膏治癲癎諸風眩暈瘡瘍皆神効非彼但云㵼心火而與芩柏諸苦藥例稱者比也論諸藥余治㽸疴先循經絡者即諸古書所載引經報使藥貴識真爾如心經以人参益氣石脂補血硃砂鎮心天竺黄去痰澤㵼㵼熱而蓮肉茯神赤茯苓逺志益智酸棗之屬利心竅以安神識中間製煉如以苦焦之味逹本經醎引所畏辛避所勝酸益其母而甘洩其子皆裁成藥􅒏之道論五穀粳米造飯用荷葉煮湯寛中芥菜葉者豁痰紫蘇葉者行氣解肌薄荷葉者氣熱淡竹葉者辟暑造粥則粥之外入茯苓酪者清上實下薯蕷粉者理胃花椒汁者辟嵐瘴薑葱汁䜴者發汗與夫古方羊腎猪腎之類無非藥力也一人淋素不服藥余教以專啖粟米粥絶他味旬餘減月餘痊此五穀治病之理論五菓棃汁䟽風豁痰蒸露治内熱藕汁研墨止吐血鼻衂研桃仁調酒破血積胡桃仁佐破故帋鹽水糊丸治腰濕痛如神大棗煮汁去渣煉膏救小兒脾虚胃寒不能藥者蓮肉作末甦禁口痢柿蒂加碓頭糠止轉食凡此余以應驗習之家亦五菓治疾之理論五菜韮白愈淋子澁精大葱汁和五倍子末澁虚脫之痢非虚脫不用莧煮汁愈初痢羅蔔風乾愈傷食𠻳白扁豆益脾清暑蒜汁煮香附加蓽撥大黄治瘴鄉中毒諸菜俱能治病貴專啖耳論五畜禽蟲之属黄牛肉補氣與綿黄茋同功羊肉補血與熟地黄同功猪肉無補而人習之化也惟膽于肝肚于胃腰子于腎􅆃髓于骨心于血可引諸藥入本經實非其補鹿則全體大補異時每欲以肉汁煉膏如霞天膏小刀圭之法恨不多得牛肝連膽用朴硝作脯消痞塊骨髓煎油擦四肢之損禽則鵞善䟽風稚雞補損老雞作羮起衰蟲則蜣蜋土裹燒熟與兒食治疳蚋皮作丸大治驚癎疳痢以上予治厚養之人多用之亦従其化也獨犬之壯陽俗夫所尚古方戊戌酒盖為虚寒病設耳或云士無故不殺犬豕則古人已饈於􅈿矣意者黑黄二色足補脾腎亦可如小刀圭法為之以治虛怯勞瘵而戒恣欲之非價㢘工省可濟貧乏云論異類有情丸人至中年覺體衰弱便可以此丸服餌此方藥僅三品而補性極峻盖鹿乃陽獸食山中之靈草故多夀夏至一隂生而角便解角得純陽之氣故補人身之陽龜者靈物也属隂能養息上可補心下可補腎故補人身之隂虎西方之獸也属金而能抑木故虎嘯而風生也三者皆多夀皆有生育皆有靈性殊非草木金石比也服餌寧無補益乎鹿茸鹿角霜龜板虎脛骨各如常製為末以猪脊髓加煉蜜為丸梧桐子大空心鹽湯吞五七十丸或加猪膽汁三合和于劑中以寓降火之意難經本義十八難圖註辨十八難秦越人曰手太隂陽明金也足少隂太陽水也水流下行而不能上故在下部足厥隂少陽木也生手太陽少隂火火炎上行而不能下故為上部手心主少陽火生足太隂陽明土土主中宫故在中部也滑伯仁註曰手太隂陽明金下生足太陽少隂水水􅒏下流故居下部足少隂太陽水生足厥隂少陽木木生手少隂太陽火及手心主火火炎上行是為上部火生足太隂陽明土土居中部復生肺金此五行子母更相生養者也觀十八難所列之圖乃以手厥隂心主火與手少陽三焦火分診在下部右尺圖與註自相背戾後人翕然宗之不復查考且經文只云手之太隂陽明足之太陽少隂為上下部言肺髙而腎下子母相望之意按脉經以心肺合於上焦脾胃肝膽合於中焦腎膀胱合于下焦兩尺分診兩腎無手厥隂少陽之語千金方診法與脉經同顧靈蘭祕典篇曰膻中者臣使之官喜樂出焉啓𤣥子註曰膻中在胸中兩乳間為心君播宣教令氣布隂陽氣和志適則喜樂由生脉要精微以左寸之外候心内以候膻中膻中為十二臓之一以其無形與心肺並居胸中故診附焉本義此圖恐未必是伯仁之意豈有自相矛盾哉此必後人泥脉訣右肺大腸脾胃命之說而以此圖牽合因土居中部乃以火居下部生中土也獨不思手太陽少隂之火復何所生耶智者自能辨之按何一陽醫學統宗有云圖註難經乃四明張世賢襲取紀天錫袁坤厚虞庶舊章斷簡殘文淺附己意欺為新撰維揚運司梓行失旨處頗多然則難經本義之圖註實張世賢之集者後人増附梓焉非滑氏之筆明矣難經肺金肝木浮沈說三十三難曰肝青象木肺白象金肝得水而沈木得水而浮肺得水而浮金得水而沈其意何也答詞以五音剛柔吸受云云是啓後學要識五行造化之妙而註者又以長生臨官帝旺為言而不就肝肺上究竟其說似訓釋太深𤣥之又𤣥者也物物具五行如註所云心脾腎得水皆沈不知又當何解據愚見不若平平講去亦自明暢且又開發後學隂陽相感之義雖不明言而理實寓焉盖肺雖属金而位在膈上行陽道多且其經為手太隂主乎氣以體而言金也以用而言氣也而又属手經故浮肺熟則手經之氣去而金之體獨存故熟則沈也肝雖属木而位處膈下行隂道多且其經為足厥隂主乎血以體而言木也以用而言血也而又属足經故沈肝熟則足經之血去而木之體獨存故熟則浮也返本之義也臨官帝旺之說㣲覺牽合學者詳之難經七十五難金不得平木不字辨生生子曰七十五難云經言東方實西方虛㵼南方補北方何謂也云云故㵼火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也滑伯仁曰不字疑衍四明陳氏曰仲景云木行乗金曰横内經曰氣有餘則制巳所勝而侮所不勝木實金虛是木横而凌金侮所不勝也木實本以金平之然以其氣正强而横金平之則兩不相伏而戰戰則實者亦傷虚者亦敗金虛本資氣于土然其時土亦受制未足以資之故取水為金之子又為木之母於是㵼火補水使水勝火則火餒而取氣于木木乃減而不復實水為木母此母能令子虚也木既不實其氣乃平平則金免木凌而不復虚水為金子此子能令母實也所謂金不得平木不得徑以金平其木必㵼火補水而旁治之使木金之氣自然兩平耳而滑伯仁又曰陳氏之說亦自有理但為不之一字纏擾牽强費辭不若直以不字為衍文耳余曰不字非衍難經所謂不者乃姑息之謂不徑以金平木故有㵼火補水之治觀越人謂金木水火土當更相平更字與不字乃一篇之大關鍵也此更字與二十難更相乗更相伏更字義同謂互相平制不直令金以平木也觀仲景木行乗金曰横之横字則知金非等閑之虚即驟補之猶未能自保況欲令其得平木乎彼金之得平木乃以五行順相平者言也此以五行更相平者言也更與順自當有别不然越人何不徑去補金使得平木而乃曰㵼南方補北方哉越人之微意正欲㵼火以泄木之餘補水以實金之虚五行逓相濟養更互尅伐子為母復仇之義故曰欲令金不得平木也此圍魏救韓之意不平之平乃所以平也陳氏訓不字誠是但于更字仍欠發明故未免啓後人之疑醫道如伯仁亦可謂精詣矣乃以不字為衍文余又不知其何見也此不字乃一篇主意㵼火補水之治法也觀者甚母忍難經八十一難篇是病二字辨生生子曰八十一難云經言無實實虚虛損不足而益有餘是寸口脉耶将病自有虚實耶其損益柰何然是病非謂寸口脉也謂病自有虛實也云云彼註難經者謂是病二字非誤即衍愚謂二字非誤亦非衍盖答辭也言此是病之虚而非寸口脉也與夫子答子路曰然有是言也一類皆答問文法爾經書中多有之窮經者能以意逆志而玩其辭斯得之矣節抄靈樞引生生子曰余惟醫以靈素為祖但其書出秦火之後斷簡殘篇幾至散失雖命世之才如秦越人淳于意張華諸公胗治稱神竒者亦未之訓釋至啓𤣥子始於素問掇摭成卷門分章析引類註明厥功亦偉矣而偏執局曲之夫尚吹毛索疵妄加訶詆乃於靈樞非惟不敢註一字且置此書略不涉目夫靈樞一經於臓腑經絡盈虚順逆針法疾徐靡不周悉顧棄而不讀何稱醫哉何稱醫哉余觀史崧先生序靈樞有曰夫為醫者在讀書讀而不能為醫者有矣未有不讀而能為醫者也余嘗従事斯語用節抄靈樞數條於後以備恭考云本神篇黄帝問於岐伯曰何謂徳氣生精神魂魄心意志思智慮請問其故岐伯答曰天之在我者徳也地之在我者氣也徳流氣薄而生者也故生之來謂之精兩精相摶謂之神隨神往來者謂之䰟並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則僻邪不至長生久視是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不蔵愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破㬷脫肉毛悴色夭死于冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人隂縮而攣筋兩脇骨不舉毛悴色夭死於秋肺喜樂無極則傷魄􅅎傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俛仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五蔵主蔵精者也不可傷傷則失守而隂虛隂虚則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也肝蔵血血舎魂肝氣虛則恐實則怒脾蔵營營舎意脾氣虚則四支不用五蔵不安實則腹脹涇溲不利心蔵脉脉舎神心氣虚則悲實則笑不休肺蔵氣氣舎􅅎肺氣虚則鼻塞不利少氣實則喘喝胷盈仰息腎蔵精精舎志腎氣虛則厥實則脹五蔵不安必審五蔵之病形以知其氣之虚實謹而調之也決氣篇黄帝曰余聞人有精氣津液血脉余意以為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相摶合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰穀入氣滿淖澤注於骨骨属屈伸洩澤補益腦髓皮膚潤澤是謂液何謂血岐伯曰中焦受氣取汁變化而赤是謂血何謂脉岐伯曰壅遏營氣令無所避是謂脉黄帝曰六氣者有餘不足氣之多少腦髓之虛實血脉之清濁何以知之岐伯曰精脱者耳聾氣脱者目不明津脱者腠理開汗大泄液脱者骨属屈伸不利色夭腦髓消脛痠耳數鳴血脱者色白夭然不澤其脉空虛此其候也黄帝曰六氣者貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也脹論黄帝曰夫氣之令人脹也在于血脉之中耶蔵府之内乎岐伯曰二者皆存焉然非脹之舎也黄帝曰願聞脹之舎岐伯曰夫脹者皆在于臓腑之外排蔵府而郭胷脇脹皮膚故命曰脹黄帝曰蔵府之在胸脇腹裏之内也若匣匱之蔵禁器也各有次舎異名而同處一城之中其氣各異願聞其故岐伯曰夫胸腹蔵府之郭也膻中者心主之宫城也胃者太倉也咽喉小腸者𫝊送也胃之五竅者閭里門户也㢘泉玉英者津液之道也故五蔵六腑者各有畔界其病各有形狀營氣循脉衛氣逆為脉脹衛氣並脉循分為膚脹三里而冩近者一下逺者三下無問虛實工在疾冩黄帝曰願聞脹形岐伯曰夫心脹者煩心短氣卧不安肺脹者虗滿而喘咳肝脹者脇下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣卧不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃腕痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感于寒則飱泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者小腹滿而氣癃三焦脹者氣滿于皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息帝曰脹者焉生何因而有岐伯曰衛氣之在身也常然並脉循分肉行有逆順隂陽相隨乃得天和五蔵更始四時循序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也帝曰脹論無問虛實工在疾㵼近者一下逺者三下今有其三而不下者其過焉在岐伯曰衛氣相亂隂陽相逐其於脹也當冩不冩氣故不下三而不下必更其道氣下乃止不可復始可以萬全烏有殆者乎其脹也必審其脉當冩則冩當補則補如鼔應桴惡有不下者乎五癃津液篇黄帝問於岐伯曰水穀入于口輸於腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣内逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道岐伯曰水穀皆入于口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留于分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留于膀胱則為溺與氣五蔵六府心為之主耳為之聴目為之候肺為之相肝為之将脾為之衛腎為之主外故五蔵六府之津液盡上滲於目心悲氣并則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故欬而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五穀之津液和合而為髙者内滲入于骨空補益腦髓而下流於隂股隂陽不和則使液溢而下流於隂髓液皆減而下下過度則虛虛故腰背痛而脛痠隂陽氣道不通四海閉塞三焦不寫津液不化水穀並行腸胃之中别于迴腸留于下焦不得渗膀胱則下焦脹水溢則為水脹此津液五别之逆順也賊風篇黄帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷於濕氣蔵於血脉之中分肉之間久留而不去若有所墮墜惡血在内而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黄帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之志所卒然而病者其故何也唯有因鬼神之事乎岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣内亂兩氣相搏其所從来者微視之不見聴而不聞故似鬼神黄帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也婦人無鬚篇黄帝曰婦人無鬚者無血氣乎岐伯曰衝脉任脉皆起於胞中上循背裏為經脉之海其浮而外者循腹右上行㑹於咽喉别而絡唇口血氣盛則充膚熱肉血獨盛則澹渗皮膚生毫毛今婦人之生有餘於氣不足于血以其數脱血也衝任之脉不榮口唇故鬚不生焉黄帝曰士人有傷於隂隂氣絶而不起隂不用然其鬚不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脉血寫不復皮膚内結唇口不榮故鬚不生黄帝曰其有天宦者未嘗被傷不脫于血然其鬚不生其故何也岐伯曰此天之所不足也其任衝不盛宗筋不成有氣無血唇口不營故鬚不生黄帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顔色黄赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣少隂常多氣少血厥隂常多血少氣太隂常多血少氣此天之常數也憂恚無言篇黄帝問於少師曰人之卒然憂恚而言無音者何道之寒何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也㑹厭者音聲之户也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音黄帝曰刺之柰何岐伯曰足之少隂主繫於舌絡於横骨絡于㑹厭兩冩其血脉濁氣乃辟㑹厭之脉上絡任脉取之天突其厭乃發也邪客篇黄帝問於伯髙曰願聞人之肢節以應天地柰何伯高答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五蔵天有六律人有六府天有冬夏人有寒熱天有十月人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有隂陽人有夫妻嵗有三百六十五日人有三百六十節地有髙山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脉地有泉脉人有衞氣地有草蓂人有毫毛天有晝夜人有卧起天有列星人有牙齒地有小山人有小節地有山石人有髙骨地有林木人有募筋地有聚邑人有䐃肉嵗有十二月人有十二節地有四時不生草人有無子此人與天地相應者也大惑篇黄帝問於岐伯曰余嘗上於清冷之臺中階而顧匐匐而前則惑余私異之竊内怪之獨瞑獨視安心定氣久而不解獨傳獨眩披髪長跪俛而視之後久之不已也卒然自上何氣使然岐伯對曰五蔵六府之精氣皆上注于目而爲之精精之窠爲眼骨之精爲瞳子筋之精爲黑眼血之精爲絡其窠氣之精爲白眼肌肉之精爲約束裹擷筋骨血氣之精而與脉并爲系上屬于腦後出于項中故邪中于項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視岐視岐見兩物目者五蔵六府之精也營衛䰟魄之所常營也神氣之所生也故神勞則䰟􅅎散志意亂是故瞳子黑眼法於隂白眼赤脉法於陽也故隂陽合𫝊而精明也目者心使也心者神之舎也故神精亂而不轉卒然見非常處精神䰟魄散不相得故曰惑也黄帝曰余疑其然余每之東苑未曾不惑去之則復余唯獨爲東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者爲迷甚者爲惑十二經絡臓象見証手太隂肺蔵象是經多氣少血肺之爲蔵六葉兩耳四垂如葢附著於􅆃之第三椎中有二十四空行列分布諸蔵之氣爲五蔵華葢云其經起於中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内肩下臂上通名曰臑行少隂心主之前臑内亷凡有三脉太隂居前少隂居後厥隂居中也下肘中臂上臑下接處曰肘循臂内上骨下亷臑下掌上名曰臂臂有二骨今太隂脉循臂上骨之下亷也入寸口掌後陷中動脉太淵穴也寸口中動脉經渠穴也上魚循魚際魚際穴也散脉中是出大指之端少商穴也其支者從腕後直出次指内亷出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此爲臂厥是主肺所生病者咳𠻳上氣喘喝煩心胸滿臑臂内前亷痛掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠虛則肩背痛寒少氣不足以息溺色黄變卒遺失無度手陽明大腸經蔵象是經多血多氣大腸長二丈一尺廣四寸徑一寸當臍右囘十六曲盛穀一斗水七升半其經之脉起于大指次指之端商陽穴也循指上亷指上亷本節前陷中二間穴本節後陷中三間穴也出合谷兩骨間合谷穴也上入兩筋之中陽溪穴也循臂上亷入肘外亷曲池穴也上臑外前亷上肩出髃骨之前亷上出於柱骨之㑹上下入缺盆絡肺下膈属大腸其支者從缺盆上頸貫頬入下齒中還出挟口交人中左之右右之左上挾鼻孔是動則病齒痛䪼腫是主津液所生病者目黄口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脉所過者熱腫虚則寒凛不復足陽明胃經蔵象是經多血多氣胃大一尺五寸紆曲屈伸長二尺六寸徑五寸盛穀二斗水一斗五升其經之脉起於鼻之交頞中旁約太陽之脉下循鼻外入上齒中還出挾口環唇下交承漿却循頤後下亷出大迎循頬車上耳前過客主人循髪際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈属胃絡脾其直者從缺盆下乳内亷下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏下膝臏中腿下脛上接處曰膝下循脛外亷謂脛骨之外亷也其外亷下膝三寸三里穴也又下三寸巨虛上亷也又下三寸巨虛下亷也直下至腕中解溪穴也下足跗衝陽穴也足面曰跗跗上陷中動脉是也凡是跗直下大指之間皆有動脉其大指之間足少陽脉也上入指本節後間動脉足厥隂脉也上跗上動脉足陽明脉也針經終始篇云陽明在上厥隂在中少陽在下者是也凡言間皆謂兩指中間也入中指内間中指内間本節後陷中陷谷穴也本節前陷中内庭穴也大指次指之端厲兌穴也其支者下亷三寸而别下入中指外間其支者别跗上入大指間出其端是動則病灑灑然振寒善伸數欠頰黑病至則惡人與火聞木音則惕然而驚心欲動獨閉户牖而處甚則欲上髙而歌棄衣而走賁响腹脹是爲骬厥是主血所生病者狂瘧溫淫汗出鼽衂口喎唇脗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兔䯒外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消穀善飢溺色黄不足則身以前皆寒慄胃中寒則脹滿足太隂脾經蔵象是經多氣少血脾廣三寸長五寸掩乎太倉附著扵脊之第十一椎其經之脉起於大指之端隱白穴也在大指端内側循指内側白肉際大指内側本節後大都穴也過核骨後核骨下太白穴也核骨在足大指本節後約二寸内踝骨前約三寸如棗核横于足内側赤白肉際者是也竇太師指爲孤拐骨者非是也上内踝前亷内踝下前陷中商丘穴也上踹内循脛骨後交出厥隂之前上膝股内前亷膝輔骨下陷中隂陵泉穴也入腹属脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本强食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動捶食不下煩心心下急痛寒瘧溏瘕洩水閉黄疸不能卧强立股膝内瘇厥足大指不用手少隂心經蔵象是經多氣少血心形如未敷蓮花居肺下膈上附著於脊之第五椎其經之脉起于心中出属心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下肺脉從肺系横出腋下心脉從肺而出于腋下包絡脉從脇下抵腋下下循臑内後亷行太隂心主之後下肘内少海穴也循臂内後亷臂内後亷上脘一寸半靈道穴也抵掌後兌骨之端神門穴也入掌内後亷掌内後亷小指本節陷中少府穴也循小指之内出其端少沖穴也在小指内亷之端是動則病嗌乾心痛渴而欲飲是爲臂厥是主心所生病者目黄脇痛臑臂内后亷痛厥掌中熱手太陽小腸經蔵象是經多血多氣小腸長三丈二尺左囘叠積十六曲胃之下口小腸上口也在臍上二寸水穀於是入焉復下一寸爲水分穴則小腸下口也至是而泌别清濁水液入膀胱滓穢入大腸其經之脉起于小指之端少澤穴也循手外側小指本節前谷穴也本節後陷中後溪穴也上腕臂下掌上節處曰腕腕前起骨中陷中腕骨穴也當腕中陷處陽谷穴也出踝中直上循臂骨下亷出肘内側兩筋之間少海穴也上循臑外後亷出肩解繞肩脾交肩上入缺盆絡心循咽下膈抵胃属小腸其支者從缺盆循頸上頰至目銳眥却入耳中其支者别頰上䪼抵鼻至目内眥斜終於顴是動則病嗌痛頷腫不可囘顧肩似㧞臑似折是主液所生病者耳聾目黄頬腫頸頷肩臑肘臂外後亷痛足太陽膀胱蔵象是經多血少氣膀胱縦廣九寸居腎之下大腸之側小腸下口乃膀胱上口水液由是滲入焉盛溺九升九合其經之脉起於目内眥上額交巔其支者従巔至耳上角其直者従巔入絡腦還出别下項循肩髆内挾脊抵腰中入循膂絡腎属膀胱其支者従腰中下挟脊貫臀入膕中腿下踹上接處約文中央動脉曰膕中委中穴也其支者従髆内左右别下貫胛挟脊内過髀樞竇云髀骨節也循髀外従後亷下合膕中以下貫踹内足肚曰踹出外踝之後崑崙穴也循京骨京骨穴也至小指外側小指外側本節後陷中束骨穴也本節前通谷穴也小指端至隂穴也是動則病衝頭痛目似脫項似㧞脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂顛疾頭顖頂痛目黄淚出鼽衂項背腰凥膕腨脚皆痛小指不用盛者人迎大再倍于寸口虚者人迎反小於寸口也足少隂腎蔵象是經多氣少血腎有兩枚重一斤一兩狀如石卵附著于脊之十四椎當胃下兩旁其經之脉起于小指之下斜走足心湧泉穴也出于然骨之下然骨穴也在内踝前起大骨下陷中循内踝之後内踝之後跟骨之上陷中動脉大溪穴也上太陵二寸復溜穴也别入跟中以上踹内出膕内亷隂谷穴也上脉内後亷貫脊属腎絡膀胱其直者従腎上貫膈入肺中循喉嚨侠舌本其支者從肺出絡心注胸中是動則病飢不欲食面黑如地色欬唾則有血喝喝而喘坐而欲起目􅉩􅉩如無所見心如懸病飢狀氣不足則善恐心惕惕如人将捕之是謂骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疸腸癖脊臀股内後亷痛痿厥嗜卧足下熱而痛盛者寸口大再倍于人迎虛者寸口反小于人迎也手厥隂心包絡之經是經多血少氣滑伯仁曰心包一名手心主以臓象校之在心下横膜之上竪膜之下與横膜相粘而黄脂漫裹者心也其漫脂之外有細筋膜如系與心肺相連者心包也君火以名相火以位手心主代君火行事以用而言則曰手心主以經而言則曰心包絡一經二名實相火也其經之脉起于胸中出属心包絡下膈歴絡三焦其支者循胸出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中曲澤穴也下臂行兩筋之間兩節之上腕三寸間使穴也當腕中太陵穴也入掌中勞宫穴也穴有動脉循中指出其端中衝穴也其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脇支滿心中澹澹大動面赤目黄喜笑不休是主脉所生病者煩心心痛掌中熱手少陽三焦之經是經多氣少血三焦者水穀之道路氣之所終始也上焦在心下下膈在胃上口其治在膻中直兩乳間陷者中中焦在胃中脘當臍上四寸不上不下其治在臍旁下焦當膀胱上口其治在臍下一寸其經之脉起于小指次指之端闗沖穴也上出兩指之間兩指之間陷中腋門穴也上兩指本節後間陷中中渚穴也循手表腕陽池穴也出臂外兩骨之間兩骨之間上腕二寸支溝穴也上貫肘天井穴也循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循属三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頬至䪼䪼頬骨也其支者從耳後入耳中出走耳前過客主人前交頬至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目銳眥痛頬痛耳後肩臑肘臂外皆痛小指次指不用足少陽膽蔵象是經多氣少血膽長三寸在肝之短葉間包精汁三合爲清淨之府諸府皆𫝊穢濁獨膽無所𫝊道故曰清浄膽汁減則目昏又吐傷膽倒則視物倒植其經之脉起于目銳眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者従耳後入耳中出走耳前至目銳眥後其支者别銳眥下大迎合手少陽抵于䪼下加頰車下頭合缺盆以下胸中貫膈絡肝属膽循脇裏出氣街繞毛際横入髀厭中其直者従缺盆下腋循胸過季脇下合髀厭中竇氏云腹下腿上節處是也以下循髀陽出膝外亷下外輔骨之前外輔骨之前膝之下一寸陽陵泉穴也伸足取之直下抵絶骨之端陽輔穴也下出外踝之前丘墟穴也循足跗上入小指次指之間小指次指之間本節前陷中侠溪穴也本節後陷中臨池穴也小指次指之端竅隂穴也其支者别跗上入大指之間循大指岐骨内出其端還貫𤓰甲出三毛是動則病口苦善太息心脇痛不能轉側甚則面㣲塵體無膏澤足外反熱是為陽厥是主骨所生病者頭角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀夾癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用足厥隂肝蔵象是經多血少氣肝左三葉右四葉凡七葉其治在左其蔵在右附著于脊之第九椎其經之脉起于大指叢毛之際大敦穴也上循足跗上亷足跗上㢘大指間陷中行間穴也大指本節後間陷中太衝穴也去内踝一寸上踝八寸交出太隂之後内踝前一寸中封穴也上膕内㢘曲泉穴也循股隂入毛中過隂器抵小腹挾胃属肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹於巔其支者從目系下頬裏環唇内其支者復從肝别貫膈上注肺經脉篇是動則病腰痛不可以俛仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞洩狐疝遺溺癃閉督脉督之爲言都也行背部之中行爲陽脉之都綱竒經八脉之一也督脉者起于下極之腧並于脊裏上至風府入腦上巔循額至鼻柱属陽脉之海也脊之爲骨凡二十一椎通項骨三椎共二十四椎自屛翳而起歴長强穴並脊裏而上行循腰腧陽闗命門懸樞脊中筋縮至陽陵靈臺神道身柱過風門循陶道大椎瘂門至風府入腦循腦戸强間後頂上巔至百㑹前項顖㑹上星神庭循額至鼻柱經素髎水溝兊端至齗交而終焉云陽脉之海者以人之脉絡周流于諸陽之分譬猶水也而督脉則爲之都綱故曰陽脉之海任脉任之爲言姙也行腹部中行爲婦人生養之本竒經之一脉也任脉者起于中極之下以上毛際循腹裏上關元至喉嚨属隂脉之海也任與督一源而二岐督則由㑹隂而行背任則由㑹隂而行腹夫人身之有任督猶天地之有子午也人身之任督以腹背言天地之子午以南北言可以分可以合者也分之以見隂陽之不雜合之以見渾淪之無間一而二二而一者也任脉起于中極之下㑹隂之分也由是循曲骨上毛際至中極行腹裏上循關元石門氣海隂交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宫華蓋璇璣天突亷泉上頤循承漿環唇上至齗交分行繫兩目下之中央㑹承泣而終焉云隂脉之海者亦以人之脉絡周流於諸隂之分譬猶水也而任脉則爲之總㑹焉故曰隂脉之海附王好古類集五臓苦欲補㵼藥味肝苦急急食甘以緩之甘草欲散急食辛以散之川芎以辛補之細辛以酸㵼之芍藥虛以生薑陳皮之類補之經曰虚則補其母水能生木腎乃肝之母腎水也苦以補腎熟地黄黄柏是也如無他證錢氏地黄丸主之實則白芍藥㵼之如無他證錢氏㵼青丸主之實則㵼其子心乃肝之子以甘草㵼心心苦緩急食酸以收之五味子欲軟急食鹹以軟之芒硝以鹹補之澤㵼以甘㵼之人參黄茋甘草虛以炒鹽補之虚則補其母木能生火肝乃心之母肝木也以生薑補肝如無他證錢氏安神丸主之實則甘草㵼之如無他證錢氏方中重則㵼心湯輕則導赤飲脾苦濕急食苦以燥之白术欲緩急食甘以緩之甘草以甘補之人参以苦㵼之黄連虚則以甘草大棗之類補之如無他證錢氏益黄散主之心乃脾之母以炒鹽補心實則以枳實㵼之如無他證以㵼黄散㵼之肺乃脾之子以桑白皮㵼肺肺苦氣上逆急食苦以㵼之訶子皮一作黄芩欲收急食酸以收之白芍藥以辛㵼之桑白皮以酸補之五味子虚則五味子補之如無他證錢氏阿膠散補之脾乃肺之母以甘草補脾實則桑白皮㵼之如無他證以㵼白散㵼之腎乃肺之子以澤㵼㵼腎腎苦燥急食辛以潤之知母黄柏欲堅急食苦以堅之知母以苦補之黄柏以鹹㵼之澤㵼虚則熟地黄黄蘖補之腎本無實不可㵼錢氏止有補腎地黄丸無㵼腎之藥肺乃腎之母以五味子補肺以上五臓補㵼内經臓氣法時論中備言之欲究其精詳看本論臓腑㵼火藥黄連㵼心火木通㵼小腸火黄芩㵼肺火梔子佐之黄芩㵼大腸火柴胡㵼肝火黄連佐之柴胡㵼膽火亦以黄連佐之白芍藥㵼脾火石膏㵼胃火知母㵼腎火黄柏㵼膀胱火柴胡㵼三焦火黄芩佐之以上諸藥各㵼其火不惟止能如此更有治病合為君合為臣處詳其所宜而用勿執一也附李東垣藥類法象天有隂陽風寒暑濕燥火三隂三陽上奉之溫􅈵寒熱四氣是也溫熱者天之陽也􅈵寒者天之隂也此乃天之隂陽也地有隂陽金木水火土生長化收蔵下應之辛甘淡酸苦鹹五味是也皆象於地辛甘淡者地之陽也酸苦鹹地之隂也此乃地之隂陽也味之薄者爲隂中之陽味薄則通酸苦鹹平是也味之厚者爲隂中之隂味厚則泄酸苦鹹寒是也氣之厚者爲陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者爲陽中之隂氣薄則發泄辛甘淡平􅈵寒是也輕清成象味薄􅚿之類本乎天者親上重濁成形味厚大黄之類本乎地者親下氣味辛甘發散爲陽酸苦湧泄爲隂清陽發腠理清之清者也清陽實四肢清之濁者也濁隂歸六腑濁之濁者也濁隂走五臓濁之清者也藥性要旨苦藥平升㣲寒平亦升甘辛藥平降甘寒㵼火苦寒㵼濕熱苦甘寒㵼血熱用藥升降浮沉補㵼法肝膽味辛補酸㵼氣溫補涼㵼心小腸味鹹補甘㵼氣熱補寒㵼脾胃味甘補苦㵼氣溫涼寒熱補㵼各從其宜肺大腸味酸補辛㵼氣涼補溫㵼腎膀胱味苦補鹹㵼氣寒補熱㵼五臓更相平也一臓不平所勝平之此之謂也故云安穀則昌絶穀則亡水去則榮散穀消則衞亡榮散衞亡神無所居又仲景云水入於經其血