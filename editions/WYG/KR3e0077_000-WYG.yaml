body:
  text: 醫㫖緒餘醫家類提要臣等謹案醫㫖緒餘二卷明孫一奎撰發明太極陰陽五行之理備于人身分别臟腑形質手足經上下宗氣營氣衛氣三焦包絡命門相火及各經絡配合之義又引黄庭經以證丹溪相火屬右腎之非引脈訣刋誤以駁三因方三焦有形如脂膜之謬分噎腑翻胃為二症辨癲狂癎之異治皆卓然有特識其議論諸家長短謂仲景不徒以傷寒擅名守真不獨以治火要譽戴人不當以攻擊䝉譏東垣不専以内傷樹績陽有餘陰不足之論不可以疵丹溪而攖寧生之技亦可足垂不朽尤千古持平之論原本與醫案同附赤水元珠之後今各自為帙云乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5b61589d70e977d5ddf0a9a51690a922dcb0f0cd6239246439717205da5df422
